<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaJet - Fast Instagram Downloader</title>
</head>

<body style="text-align:center; background:black; color:white; font-family:sans-serif; margin:0; padding:20px;">

    <br><br>

    <img src="{{ url_for('static', filename='mylogo.png') }}" width="120" alt="InstaJet Logo"><br>

    <h1 style="color:yellow; margin-top:10px;">InstaJet</h1>
    <h3 style="font-weight:lighter;">High-Speed Video Downloader</h3>

    <br>

    {% if error %}
    <p style="color: #ff4d4d; background: #220000; padding: 10px; border-radius: 8px; display: inline-block;">
        {{ error }}
    </p>
    {% endif %}

    <br>

    <form action="/download" method="POST">
        <input type="text" name="url" placeholder="Paste Instagram URL here" 
               required
               style="padding:15px; width:90%; max-width:350px; border-radius:10px; border:none; outline:none; font-size:16px;">
        
        <br><br>

        <button type="submit" 
                style="padding:12px 30px; background:orange; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px; color:black;">
            Download Now
        </button>
    </form>

    <br><br>

    {% if video_url %}
    <div style="text-align:center; margin-top:20px; background:#111; padding:20px; border-radius:15px; display:inline-block; width:90%; max-width:450px;">
        
        <video style="width:100%; border-radius:10px;" controls>
            <source src="{{ video_url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <br><br>

        <a href="{{ video_url }}" download>
            <button style="padding:15px 25px; 
            background:linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            color:white;
            border:none; 
            border-radius:12px; 
            font-size:18px; 
            font-weight:bold; 
            width:100%;
            cursor:pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);">
                Save to Device
            </button>
        </a>
    </div>
    {% endif %}

    <br><br>

    <p style="font-size:12px; color:gray; margin-top:40px;">
        © 2026 InstaJet • Created by Joy • All rights reserved
    </p>

</body>
</html>
