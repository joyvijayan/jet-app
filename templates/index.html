<!DOCTYPE html>
<html>
<head>
    <title>InstaJet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 80px;
            padding: 20px;
        }

        .logo {
            width: 120px;
            border-radius: 20px;
        }

        .title {
            color: #FFD700;
            font-size: 42px;
            margin: 10px 0;
        }

        .subtitle {
            color: gray;
            margin-bottom: 30px;
        }

        input {
            width: 90%;
            max-width: 320px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(45deg, orange, gold);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .video-box {
            margin-top: 30px;
        }

        video {
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
        }

        .download-btn {
            margin-top: 20px;
            padding: 12px 20px;
            background: linear-gradient(45deg, orange, yellow);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 90%;
            max-width: 300px;
            cursor: pointer;
        }

        .footer {
            font-size: 12px;
            color: gray;
            margin-top: 40px;
        }
    </style>

</head>

<body>

    <div class="container">

        <img src="/static/logo.png" class="logo">

        <h1 class="title">InstaJet</h1>
        <p class="subtitle">High-Speed Video Downloader</p>

        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste Instagram URL here" required>
            <br>
            <button class="btn" type="submit">Download Now</button>
        </form>

        {% if video_url %}

        <div class="video-box">

            <video controls>
                <source src="{{ video_url }}" type="video/mp4">
            </video>

            <br>

            <a href="{{ video_url }}" download>
                <button class="download-btn">Download Video</button>
            </a>

        </div>

        {% endif %}

        <p class="footer">
            © 2026 InstaJet • Created by Joy • All rights reserved
        </p>

    </div>

</body>
</html>
