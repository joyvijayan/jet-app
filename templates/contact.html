<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - InstaJet Online</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
        }
        .container { 
            padding: 100px 20px; 
            max-width: 600px; 
            margin: auto; 
        }
        h1 { color: #ffcc00; font-size: 2.5rem; }
        p { color: #ccc; line-height: 1.6; font-size: 18px; }
        .email-box { 
            background: #111; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            margin-top: 30px; 
        }
        .email-box a { 
            color: #ffcc00; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 20px; 
        }
        .back-btn { 
            display: inline-block; 
            margin-top: 40px; 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
            border: 1px solid #444; 
            padding: 10px 20px; 
            border-radius: 5px; 
        }
        .back-btn:hover { color: #ffcc00; border-color: #ffcc00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Us</h1>
        <p>Have any questions, suggestions, or issues with our tool? We'd love to hear from you!</p>
        
        <div class="email-box">
            <p style="margin-bottom: 5px; font-size: 14px; color: #888;">Send us an email at:</p>
            <a href="mailto:instajet.official@gmail.com">instajet.official@gmail.com</a>
        </div>

        <a href="/" class="back-btn">← Back to InstaJet</a>
    </div>

</html>
